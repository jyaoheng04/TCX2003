{% extends 'layout/base.html' %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
{% endblock %}

{% block content %}

<h2 class="admin-title">Edit User</h2>

<div class="admin-form-card">

    <form class="admin-form">

        <!-- BASIC INFO -->
        <div class="admin-grid-2">

            <div class="admin-field">
                <label>Full Name</label>
                <input type="text" value="Dr Tan">
            </div>

            <div class="admin-field">
                <label>Role</label>
                <select>
                    <option selected>Doctor</option>
                    <option>Nurse</option>
                    <option>Patient</option>
                    <option>IT Admin</option>
                </select>
            </div>

        </div>

        <div class="admin-grid-2">

            <div class="admin-field">
                <label>Email</label>
                <input type="email" value="doctor@email.com">
            </div>

            <div class="admin-field">
                <label>Phone Number</label>
                <input type="text" value="+65 9123 4567">
            </div>

        </div>

        <!-- SYSTEM INFO -->
        <div class="admin-grid-2">

            <div class="admin-field">
                <label>Staff / User ID</label>
                <input type="text" value="DR-1023">
            </div>

            <div class="admin-field">
                <label>Department</label>
                <select>
                    <option>General</option>
                    <option>Emergency</option>
                    <option>Paediatrics</option>
                    <option>Pharmacy</option>
                </select>
            </div>

        </div>

        <!-- ACCOUNT CONTROL -->
        <div class="admin-grid-2">

            <div class="admin-field">
                <label>Account Status</label>
                <select>
                    <option>Active</option>
                    <option>Disabled</option>
                    <option>Suspended</option>
                </select>
            </div>

            <div class="admin-field">
                <label>Reset Password</label>
                <button type="button" class="admin-btn-secondary">
                    Send Reset Link
                </button>
            </div>

        </div>

        <!-- READ ONLY INFO -->
        <div class="admin-info-box">

            <p><strong>Last Login:</strong> 16 May 2026, 10:45 AM</p>
            <p><strong>Account Created:</strong> 01 Jan 2025</p>

        </div>

        <!-- ACTIONS -->
        <div class="admin-actions">

            <button type="button" class="admin-btn-primary">
                Update User
            </button>

            <button type="button" class="admin-btn-danger">
                Delete User
            </button>

        </div>

    </form>

</div>

{% endblock %}
