{% extends 'layout/base.html' %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
{% endblock %}

{% block content %}

<h2 class="admin-title">Edit User</h2>

<div class="admin-form-card">

    <form class="admin-form"
          method="POST"
          action="/admin/users/edit/{{ user.user_id }}">

        <!-- BASIC INFO -->
        <div class="admin-grid-2">

            <div class="admin-field">
                <label>Full Name</label>
                <input type="text"
                       name="full_name"
                       value="{{ user.full_name }}">
            </div>

            <div class="admin-field">
                <label>Role</label>
                <select name="user_type">
                    <option value="doctor" {% if user.user_type == "doctor" %}selected{% endif %}>Doctor</option>
                    <option value="nurse" {% if user.user_type == "nurse" %}selected{% endif %}>Nurse</option>
                    <option value="patient" {% if user.user_type == "patient" %}selected{% endif %}>Patient</option>
                    <option value="admin" {% if user.user_type == "admin" %}selected{% endif %}>IT Admin</option>
                </select>
            </div>

        </div>

        <div class="admin-grid-2">

            <div class="admin-field">
                <label>Email</label>
                <input type="email"
                       name="email"
                       value="{{ user.email }}">
            </div>

            <div class="admin-field">
                <label>Phone Number</label>
                <input type="text"
                       name="phone"
                       value="{{ user.phone or '' }}">
            </div>

        </div>

        <!-- SYSTEM INFO -->
        <div class="admin-grid-2">

            <div class="admin-field">
                <label>Staff / User ID</label>
                <input type="text"
                       name="staff_id"
                       value="{{ user.staff_id }}">
            </div>

            <div class="admin-field">
                <label>Department</label>
                <select id="department" name="department" onchange="updateSpecialisation()">
                    <option value="general" {% if user.department == "general" %}selected{% endif %}>General</option>
                    <option value="emergency" {% if user.department == "emergency" %}selected{% endif %}>Emergency</option>
                    <option value="pediatrics" {% if user.department == "pediatrics" %}selected{% endif %}>Paediatrics</option>
                    <option value="pharmacy" {% if user.department == "pharmacy" %}selected{% endif %}>Pharmacy</option>
                </select>
            </div>

            <div class="admin-field">
                <label>Specialisation</label>
                <select id="specialisation" name="specialisation">
                    <option value="">Select specialisation</option>

                    <option value="family_medicine"
                        {% if user.specialisation == "family_medicine" %}selected{% endif %}>
                        Family Medicine
                    </option>

                    <option value="chronic_care"
                        {% if user.specialisation == "chronic_care" %}selected{% endif %}>
                        Chronic Care
                    </option>

                    <option value="trauma"
                        {% if user.specialisation == "trauma" %}selected{% endif %}>
                        Trauma
                    </option>

                    <option value="acute_care"
                        {% if user.specialisation == "acute_care" %}selected{% endif %}>
                        Acute Care
                    </option>

                    <option value="child_health"
                        {% if user.specialisation == "child_health" %}selected{% endif %}>
                        Child Health
                    </option>

                    <option value="neonatology"
                        {% if user.specialisation == "neonatology" %}selected{% endif %}>
                        Neonatology
                    </option>

                    <option value="orthopedic"
                        {% if user.specialisation == "orthopedic" %}selected{% endif %}>
                        Orthopedic
                    </option>

                    <option value="general_surgery"
                        {% if user.specialisation == "general_surgery" %}selected{% endif %}>
                        General Surgery
                    </option>

                </select>
            </div>
        </div>

        <!-- ACCOUNT CONTROL -->
        <div class="admin-grid-2">

            <div class="admin-field">
                <label>Account Status</label>
                <select name="status">
                    <option value="active" {% if user.status == "active" %}selected{% endif %}>Active</option>
                    <option value="disabled" {% if user.status == "disabled" %}selected{% endif %}>Disabled</option>
                    <option value="suspended" {% if user.status == "suspended" %}selected{% endif %}>Suspended</option>
                </select>
            </div>

            <div class="admin-field">
                <label>Reset Password</label>
                <button type="button" class="admin-btn-secondary">
                    Send Reset Link
                </button>
            </div>

        </div>

        <!-- READ ONLY INFO -->
        <div class="admin-info-box">
            <p><strong>Last Login:</strong> 16 May 2026, 10:45 AM</p>
            <p><strong>Account Created:</strong> 01 Jan 2025</p>
        </div>

        <!-- ACTIONS -->
        <div class="admin-actions">

            <button type="submit" class="admin-btn-primary">
                Update User
            </button>

            <button type="button" class="admin-btn-danger">
                Delete User
            </button>

        </div>

    </form>

</div>

{% endblock %}
{% block extra_js %}
<script>
const selectedSpec = "{{ user.specialisation }}";

const specMap = {
  general: ["Family Medicine", "Chronic Care"],
  emergency: ["Trauma", "Acute Care"],
  pediatrics: ["Child Health", "Neonatology"],
  surgery: ["Orthopedic", "General Surgery"]
};

function updateSpecialisation(){
  const dept = document.getElementById("department").value;
  const spec = document.getElementById("specialisation");

  spec.innerHTML = '<option value="">Select specialisation</option>';

  if(specMap[dept]){
    specMap[dept].forEach(s => {
      const val = s.toLowerCase().replace(/\s/g,'_');

      const opt = document.createElement("option");
      opt.value = val;
      opt.textContent = s;

      // ✅ auto-select DB value OR keep selection on change
      if(val === selectedSpec){
        opt.selected = true;
      }

      spec.appendChild(opt);
    });
  }
}
window.addEventListener("DOMContentLoaded", function () {
  updateSpecialisation();
});
</script>
{% endblock %}
