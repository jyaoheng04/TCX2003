{% extends 'layout/base.html' %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
{% endblock %}

{% block content %}

<h2 class="admin-title">Create New User</h2>

<div class="admin-form-card">

    <form class="admin-form">

        <div class="admin-field">
            <label>Full Name</label>
            <input type="text" placeholder="e.g. Dr John Tan">
        </div>

        <div class="admin-field">
            <label>Email</label>
            <input type="email" placeholder="e.g. john@clinic.com">
        </div>

        <div class="admin-field">
            <label>Password</label>
            <input type="password" placeholder="Enter secure password">
        </div>

        <div class="admin-grid-2">

            <div class="admin-field">
                <label>Role</label>
                <select>
                    <option>Select Role</option>
                    <option>Doctor</option>
                    <option>Nurse</option>
                    <option>Patient</option>
                    <option>Admin</option>
                </select>
            </div>

            <div class="admin-field">
                <label>Status</label>
                <select>
                    <option>Active</option>
                    <option>Disabled</option>
                </select>
            </div>

        </div>

        <div class="admin-field">
            <label>Phone Number</label>
            <input type="text" placeholder="+65 9123 4567">
        </div>

        <div class="admin-field">
            <label>Staff / Patient ID</label>
            <input type="text" placeholder="e.g. DR-1023 / PT-5561">
        </div>

        <div class="admin-actions">
            <button type="button" class="admin-btn-primary">
                Create User
            </button>
        </div>

    </form>

</div>

{% endblock %}
