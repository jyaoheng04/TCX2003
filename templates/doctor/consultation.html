{% extends 'layout/base.html' %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/doctor.css') }}">
{% endblock %}

{% block content %}

<div class="doctor-page">

    <h2 class="doctor-title">Consultation Records</h2>

    <div class="doctor-table-card">

        <table class="doctor-table">
            <thead>
                <tr>
                    <th>Patient</th>
                    <th>Symptoms</th>
                    <th>Diagnosis</th>
                    <th>Prescription</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <td class="patient-name">John Tan</td>
                    <td>Fever</td>
                    <td>Viral Infection</td>
                    <td>Paracetamol</td>
                    <td class="actions">
                        <a href="/doctor/edit/1" class="btn-edit">Edit</a>
                        <a href="#" class="btn-delete">Delete</a>
                    </td>
                </tr>
            </tbody>
        </table>

    </div>

</div>

{% endblock %}
