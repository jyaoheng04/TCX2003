{% extends 'layout/base.html' %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/patient.css') }}">
{% endblock %}

{% block content %}

<h2 class="patient-title">Reschedule Appointment</h2>

<div class="patient-form-card">

<form method="POST" class="patient-form">

    <!-- DOCTOR -->
    {% if appointment.appointment_type == "consultation" %}

        <div class="patient-field" id="doctorField">

            <label>Doctor</label>

            <select name="doctor_id"
                    id="doctorSelect"
                    required>

                {% for doctor in doctors %}

                    <option value="{{ doctor.staff_id }}"
                        {% if doctor.staff_id == appointment.doctor_id %}
                            selected
                        {% endif %}
                    >
                        {{ doctor.full_name }}
                    </option>

                {% endfor %}

            </select>

        </div>

        {% else %}

        <!-- no doctor needed for lab tests -->

        {% endif %}

    <!-- DATE -->
    <div class="patient-field">

        <label>Select New Date (From Tomorrow Onwards)</label>

        <input type="date"
               id="datePicker"
               name="date"
               required>

    </div>

    <!-- TIME SLOTS -->
    <div class="patient-field">

        <label>Select New Time</label>

        <div id="timeSlots" class="time-slot-grid"></div>

        <input type="hidden" name="time" id="selectedTime" required>

    </div>

    <div class="patient-actions">
        <button type="submit" class="patient-btn patient-btn--primary">
            Save Changes
        </button>

        <a href="/patient/appointments" class="patient-btn patient-btn--secondary">
            Cancel
        </a>
    </div>

</form>

</div>

<!-- ===================== -->
<!-- JAVASCRIPT -->
<!-- ===================== -->
<script>

const datePicker = document.getElementById("datePicker");
const timeSlotsDiv = document.getElementById("timeSlots");
const selectedTime = document.getElementById("selectedTime");

const doctorSelect = document.getElementById("doctorSelect"); // may be null
const appointmentType = "{{ appointment.appointment_type }}";

const today = new Date();
today.setDate(today.getDate() + 1);
datePicker.min = today.toISOString().split("T")[0];

async function getBooked(date) {

    let url = `/patient/available-times-edit?date=${date}&appointment_type=${appointmentType}`;

    // ONLY add doctor if it exists (consultation only)
    if (appointmentType === "consultation" && doctorSelect) {
        url += `&doctor_id=${doctorSelect.value}`;
    }

    const res = await fetch(url);
    const data = await res.json();

    return data.booked || [];
}

function generateSlots() {

    const slots = [];
    const start = 8 * 60;   // 08:00
    const end = 18 * 60;    // 18:00

    const type = appointmentType;

    // =========================
    // CONSULTATION (50 min, hourly start)
    // =========================
    if (type === "consultation") {

        const duration = 50;

        for (let hour = 8; hour <= 18; hour++) {

            const startMinutes = hour * 60;
            const endMinutes = startMinutes + duration;

            const startH = String(hour).padStart(2, "0");
            const startM = "00";

            const endH = String(Math.floor(endMinutes / 60)).padStart(2, "0");
            const endM = String(endMinutes % 60).padStart(2, "0");

            slots.push(`${startH}:${startM} - ${endH}:${endM}`);
        }
    }

    // =========================
    // BLOOD / URINE (30 min rolling slots)
    // =========================
    else {

        const duration = 30;
        let current = start;

        while (current + duration <= end) {

            const startH = String(Math.floor(current / 60)).padStart(2, "0");
            const startM = String(current % 60).padStart(2, "0");

            const endTime = current + duration;
            const endH = String(Math.floor(endTime / 60)).padStart(2, "0");
            const endM = String(endTime % 60).padStart(2, "0");

            slots.push(`${startH}:${startM} - ${endH}:${endM}`);

            current += duration;
        }
    }

    return slots;
}

async function renderSlots() {

    const date = datePicker.value;
    if (!date) return;

    const booked = await getBooked(date);
    const slots = generateSlots();

    timeSlotsDiv.innerHTML = "";

    slots.forEach(slot => {

        const startTime = slot.split(" - ")[0];

        const btn = document.createElement("button");
        btn.type = "button";
        btn.innerText = slot;
        btn.classList.add("time-slot-btn");

        if (booked.includes(startTime)) {
            btn.disabled = true;
            btn.classList.add("disabled-slot");
        }

        btn.onclick = () => {

            document.querySelectorAll(".time-slot-btn")
                .forEach(b => b.classList.remove("selected"));

            btn.classList.add("selected");
            selectedTime.value = startTime;
        };

        timeSlotsDiv.appendChild(btn);
    });
}

// SAFE event bindings
datePicker.addEventListener("change", renderSlots);

if (doctorSelect) {
    doctorSelect.addEventListener("change", renderSlots);
}

</script>

<!-- ===================== -->
<!-- STYLES -->
<!-- ===================== -->
<style>
.time-slot-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
}

.time-slot-btn {
    padding: 10px;
    border: 1px solid #ccc;
    background: #f5f5f5;
    cursor: pointer;
}

.time-slot-btn.selected {
    background: #4da3ff;
    color: white;
}

.time-slot-btn:disabled,
.disabled-slot {
    background: #ddd;
    color: #888;
    cursor: not-allowed;
}
</style>

{% endblock %}
